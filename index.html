<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore 🔥 | Gadgets Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white font-sans">

  <!-- HEADER CON TU LOGO REAL -->
  <header class="bg-black/90 backdrop-blur-lg sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div onclick="mostrarSeccion('inicio')" class="flex items-center gap-3 cursor-pointer">
        <img src="https://dlzerjvbqixllkkralfz.supabase.co/storage/v1/object/public/imagenes_productos/logo-techstore.png" 
             alt="TechStore" class="h-12 w-auto">
      </div>

      <nav class="hidden md:flex items-center gap-8 text-sm font-semibold">
        <button onclick="mostrarSeccion('inicio')" class="hover:text-orange-400 transition-colors">Inicio</button>
        <button onclick="mostrarSeccion('catalogo')" class="hover:text-orange-400 transition-colors">Catálogo</button>
      </nav>

      <div class="flex items-center gap-4">
        <button onclick="abrirLogin()" class="flex items-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 px-6 py-3 rounded-3xl font-bold text-sm transition-all active:scale-95 shadow-lg shadow-orange-500/30">
          <i class="fa-solid fa-shield-halved"></i>
          <span>Admin</span>
        </button>

        <button onclick="toggleCart()" class="relative bg-zinc-900 hover:bg-zinc-800 p-4 rounded-3xl transition-all active:scale-95">
          <i class="fa-solid fa-cart-shopping text-2xl"></i>
          <span id="cartCount" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-bold w-6 h-6 flex items-center justify-center rounded-2xl shadow-inner">0</span>
        </button>

        <button onclick="toggleMobileMenu()" class="md:hidden text-3xl">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>

    <!-- Menú móvil -->
    <div id="mobileMenu" class="hidden md:hidden bg-black border-t border-zinc-800 px-6 py-4">
      <button onclick="mostrarSeccion('inicio');toggleMobileMenu()" class="block w-full text-left py-3 text-lg">🏠 Inicio</button>
      <button onclick="mostrarSeccion('catalogo');toggleMobileMenu()" class="block w-full text-left py-3 text-lg">📦 Catálogo</button>
    </div>
  </header>

  <!-- BANNER HERO CON TU IMAGEN REAL -->
  <section id="inicio" class="relative min-h-screen flex items-center overflow-hidden">
    <img src="https://dlzerjvbqixllkkralfz.supabase.co/storage/v1/object/public/imagenes_productos/banner-hero.jpg" 
         class="absolute inset-0 w-full h-full object-cover" 
         alt="TechStore Banner">

    <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/40 to-transparent"></div>
    
    <div class="max-w-7xl mx-auto px-6 relative z-10 pt-20">
      <div class="max-w-lg">
        <h1 class="text-6xl md:text-7xl font-black tracking-tighter leading-none text-white drop-shadow-lg">
          TECHSTORE 🔥
        </h1>
        <p class="text-3xl text-orange-300 mt-4 drop-shadow-lg">Gadgets Premium • Pago Contra Entrega en Colombia</p>
        <button onclick="mostrarSeccion('catalogo')" 
                class="mt-10 bg-white text-black font-bold text-2xl px-12 py-6 rounded-3xl flex items-center gap-4 hover:scale-105 transition-all shadow-xl">
          VER CATÁLOGO COMPLETO 
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
    </div>
  </section>

  <!-- CATÁLOGO -->
  <section id="catalogo" class="max-w-7xl mx-auto px-6 py-16 hidden">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-10">
      <h2 class="text-5xl font-black tracking-tighter">Catálogo</h2>
      <div class="relative mt-6 md:mt-0">
        <input id="searchInput" type="text" placeholder="Buscar productos..." 
               class="w-full md:w-80 bg-zinc-900 border border-zinc-700 focus:border-orange-400 rounded-3xl px-8 py-5 text-lg outline-none transition-all">
        <i class="fa-solid fa-magnifying-glass absolute right-8 top-1/2 -translate-y-1/2 text-zinc-400"></i>
      </div>
    </div>

    <div id="catalogoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    
    <div id="emptyState" class="hidden text-center py-20">
      <i class="fa-solid fa-box-open text-7xl text-zinc-700 mb-4"></i>
      <p class="text-xl text-zinc-400">No encontramos productos 😔</p>
    </div>
  </section>

  <!-- Resto de tu página (login, admin, carrito, toast) -->
  <!-- Copia y pega aquí el resto de tu código anterior (loginBox, adminPanel, cartPanel, toast) -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
