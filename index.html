<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore 🔥 | Gadgets Premium Colombia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white">

  <!-- HEADER -->
  <header class="bg-black sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <h1 onclick="mostrarSeccion('inicio')" class="text-3xl font-bold cursor-pointer flex items-center gap-2">🔥 TechStore</h1>
      <nav class="flex gap-8 text-sm font-medium">
        <button onclick="mostrarSeccion('inicio')">Inicio</button>
        <button onclick="mostrarSeccion('catalogo')">Catálogo</button>
        <button onclick="mostrarSeccion('resenas')">Reseñas</button>
        <button onclick="abrirLogin()" class="bg-orange-600 hover:bg-orange-500 px-6 py-2 rounded-3xl">👤 Admin</button>
      </nav>
      <button onclick="toggleCart()" class="flex items-center gap-3 bg-zinc-900 hover:bg-zinc-800 px-6 py-3 rounded-3xl">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cartCount" class="bg-orange-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <!-- CATÁLOGO -->
  <section id="catalogo" class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold mb-8">Nuestros productos</h2>
    <input id="searchInput" type="text" placeholder="🔎 Buscar producto..." class="w-full md:w-96 bg-zinc-900 border border-zinc-800 rounded-3xl px-6 py-4 mb-8 focus:outline-none focus:border-orange-500">
    <div id="catalogoGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </section>

  <!-- MODAL PRODUCTO -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[1000]">
    <div id="modalContent" class="bg-zinc-900 rounded-3xl max-w-2xl w-full mx-4 overflow-hidden"></div>
  </div>

  <!-- CARRITO -->
  <div id="carritoPanel" class="fixed top-0 right-0 w-96 h-full bg-zinc-900 shadow-2xl translate-x-full transition-transform duration-300 z-[2000] flex flex-col">
    <div class="p-6 border-b flex justify-between">
      <h2 class="text-2xl font-semibold">Tu carrito</h2>
      <button onclick="toggleCart()" class="text-3xl">×</button>
    </div>
    <div id="carritoItems" class="flex-1 p-6 overflow-y-auto"></div>
    <div class="p-6 border-t">
      <div class="flex justify-between text-xl mb-6">
        <span>Total</span>
        <span id="subtotal" class="font-bold"></span>
      </div>
      <button onclick="comprarPorWhatsApp()" class="w-full bg-orange-600 hover:bg-orange-500 py-5 rounded-3xl text-xl font-semibold">Comprar por WhatsApp</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="hidden fixed inset-0 bg-black/95 z-[3000] flex items-center justify-center">
    <div class="bg-white text-black max-w-4xl w-full mx-4 rounded-3xl p-8 max-h-[90vh] overflow-auto">
      <div class="flex justify-between mb-6">
        <h2 class="text-3xl font-bold">Panel Admin</h2>
        <button onclick="cerrarAdmin()" class="text-3xl">×</button>
      </div>
      <div id="adminForm"></div>
      <div id="listaAdmin" class="mt-8"></div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" onclick="if(event.target.id==='loginBox')cerrarLogin()" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[4000]">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-3xl p-10 w-full max-w-xs">
      <h2 class="text-3xl font-semibold mb-8 text-center">Acceso Admin</h2>
      <input id="user" placeholder="Email" class="w-full mb-4 px-6 py-5 bg-zinc-800 rounded-3xl text-white">
      <input id="pass" type="password" placeholder="Contraseña" class="w-full mb-8 px-6 py-5 bg-zinc-800 rounded-3xl text-white">
      <button onclick="login()" class="w-full py-5 bg-orange-600 hover:bg-orange-500 rounded-3xl text-xl font-semibold">ENTRAR</button>
      <p class="text-xs text-center mt-6 text-zinc-500">Solo para el administrador</p>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-600 px-8 py-4 rounded-3xl shadow-2xl text-white">Mensaje</div>

  <!-- SUPABASE (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
