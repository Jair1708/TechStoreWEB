<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore 🔥 | Gadgets Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white font-sans">

  <!-- HEADER -->
  <header class="bg-black/90 backdrop-blur-lg sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div onclick="mostrarSeccion('inicio')" class="flex items-center gap-3 cursor-pointer">
        <img src="https://dlzerjvbqixllkkralfz.supabase.co/storage/v1/object/public/imagenes_productos/logo-techstore.png" 
             alt="TechStore" class="h-12 w-auto">
      </div>

      <nav class="hidden md:flex items-center gap-8 text-sm font-semibold">
        <button onclick="mostrarSeccion('inicio')" class="hover:text-orange-400 transition-colors">Inicio</button>
        <button onclick="mostrarSeccion('catalogo')" class="hover:text-orange-400 transition-colors">Catálogo</button>
      </nav>

      <div class="flex items-center gap-4">
        <button onclick="abrirLogin()" class="flex items-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 px-6 py-3 rounded-3xl font-bold text-sm transition-all active:scale-95">
          <i class="fa-solid fa-shield-halved"></i> Admin
        </button>
        <button onclick="toggleCart()" class="relative bg-zinc-900 hover:bg-zinc-800 p-4 rounded-3xl transition-all active:scale-95">
          <i class="fa-solid fa-cart-shopping text-2xl"></i>
          <span id="cartCount" class="absolute -top-1 -right-1 bg-orange-500 text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-2xl">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- BANNER HERO -->
  <section id="inicio" class="relative min-h-screen flex items-center overflow-hidden">
    <img src="https://dlzerjvbqixllkkralfz.supabase.co/storage/v1/object/public/imagenes_productos/banner-hero.jpg" 
         class="absolute inset-0 w-full h-full object-cover" alt="Banner">
    <div class="absolute inset-0 bg-gradient-to-r from-black/70 to-transparent"></div>
    
    <div class="max-w-7xl mx-auto px-6 relative z-10">
      <div class="max-w-lg">
        <h1 class="text-6xl font-black tracking-tighter">TECHSTORE 🔥</h1>
        <p class="text-3xl text-orange-300 mt-4">Gadgets Premium • Pago Contra Entrega</p>
        <button onclick="mostrarSeccion('catalogo')" class="mt-10 bg-white text-black font-bold text-2xl px-12 py-6 rounded-3xl hover:scale-105 transition-all">
          VER CATÁLOGO
        </button>
      </div>
    </div>
  </section>

  <!-- CATÁLOGO -->
  <section id="catalogo" class="max-w-7xl mx-auto px-6 py-16 hidden">
    <h2 class="text-5xl font-black mb-10">Catálogo</h2>
    <div id="catalogoGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </section>

  <!-- MODAL PRODUCTO -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div id="modalContent" class="bg-zinc-900 w-full max-w-lg mx-4 rounded-3xl overflow-hidden"></div>
  </div>

  <!-- LOGIN ADMIN -->
  <div id="loginBox" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200]">
    <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-sm">
      <div class="flex justify-end mb-4">
        <button onclick="document.getElementById('loginBox').classList.add('hidden')" class="text-4xl text-zinc-400 hover:text-orange-400">×</button>
      </div>
      <h2 class="text-3xl font-bold mb-6">Acceso Admin</h2>
      <input id="user" type="email" placeholder="Email" class="w-full mb-4 px-6 py-4 bg-black rounded-2xl">
      <input id="pass" type="password" placeholder="Contraseña" class="w-full mb-6 px-6 py-4 bg-black rounded-2xl">
      <button onclick="login()" class="w-full bg-orange-500 py-4 rounded-3xl font-bold">Entrar</button>
      <p class="text-xs text-center text-zinc-500 mt-6">Demo: admin@techstore.com / admin123</p>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="adminPanel" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[210] p-4">
    <div class="bg-zinc-900 w-full max-w-2xl rounded-3xl p-8">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold">Nuevo Producto</h2>
        <button onclick="cerrarAdminPanel()" class="text-5xl leading-none text-zinc-400 hover:text-white">×</button>
      </div>
      <input id="pNombre" placeholder="Nombre del producto" class="w-full mb-4 px-6 py-4 bg-black rounded-2xl">
      <input id="pPrecio" type="number" placeholder="Precio" class="w-full mb-4 px-6 py-4 bg-black rounded-2xl">
      <textarea id="pDesc" placeholder="Descripción" rows="4" class="w-full mb-4 px-6 py-4 bg-black rounded-2xl"></textarea>
      <input id="pArchivo" type="file" accept="image/*" class="w-full mb-6">
      
      <button onclick="guardarProducto()" class="w-full bg-orange-500 py-4 rounded-3xl font-bold">Publicar Producto</button>
      <button onclick="cerrarAdminPanel()" class="w-full mt-3 bg-zinc-800 py-4 rounded-3xl font-bold">Cancelar</button>
    </div>
  </div>

  <!-- CARRITO -->
  <div id="cartPanel" class="fixed top-0 right-0 h-full w-96 bg-zinc-900 border-l border-zinc-700 z-[300] translate-x-full transition-transform">
    <div class="p-6">
      <h2 class="text-3xl font-bold mb-6">Tu Carrito</h2>
      <div id="cartItems" class="space-y-6"></div>
      <div class="mt-8 border-t pt-6">
        <div class="flex justify-between text-xl"><span>Total</span><span id="cartTotal" class="font-bold text-orange-400">$0</span></div>
        <button onclick="comprarPorWhatsApp()" class="w-full mt-6 bg-green-500 py-5 rounded-3xl font-bold text-xl">Enviar por WhatsApp</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-orange-500 text-black px-8 py-4 rounded-3xl font-bold"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
