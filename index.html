<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore 🔥 | Panel Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white">

  <header class="bg-black sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <h1 onclick="window.mostrarSeccion('inicio')" class="text-3xl font-bold cursor-pointer flex items-center gap-2">🔥 TechStore</h1>
      <nav class="flex gap-8 text-sm font-medium">
        <button onclick="window.mostrarSeccion('inicio')">Inicio</button>
        <button onclick="window.mostrarSeccion('catalogo')">Catálogo</button>
        <button onclick="window.abrirLogin()" class="bg-orange-600 hover:bg-orange-500 px-6 py-2 rounded-3xl transition-all">👤 Admin</button>
      </nav>
      <button onclick="window.toggleCart()" class="flex items-center gap-3 bg-zinc-900 hover:bg-zinc-800 px-6 py-3 rounded-3xl">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cartCount" class="bg-orange-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <section id="inicio" class="max-w-7xl mx-auto px-6 py-20 text-center">
    <h2 class="text-6xl font-extrabold mb-4">Lo último en tecnología</h2>
  </section>

  <section id="catalogo" class="max-w-7xl mx-auto px-6 py-12 hidden">
    <h2 class="text-4xl font-bold mb-8 text-center">Nuestros productos</h2>
    <div id="catalogoGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </section>

  <div id="loginBox" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 w-80">
      <h3 class="text-xl font-bold mb-4 text-orange-500 text-center">Acceso Admin</h3>
      <input id="user" type="email" placeholder="Email" class="w-full bg-black border border-zinc-800 p-3 mb-2 rounded-xl outline-none focus:border-orange-500">
      <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-black border border-zinc-800 p-3 mb-4 rounded-xl outline-none focus:border-orange-500">
      <button onclick="window.login()" class="w-full bg-orange-600 py-3 rounded-xl font-bold hover:bg-orange-500">Entrar</button>
      <button onclick="window.cerrarLogin()" class="w-full mt-4 text-zinc-500 text-sm">Cancelar</button>
    </div>
  </div>

  <div id="adminPanel" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[110] overflow-y-auto p-4">
    <div class="bg-zinc-900 border border-zinc-800 w-full max-w-2xl p-8 rounded-3xl shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-orange-500">Gestión de Producto</h2>
        <button onclick="window.cerrarAdmin()" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="pNombre" type="text" placeholder="Nombre" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-orange-500 outline-none">
        <input id="pPrecio" type="number" placeholder="Precio" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-orange-500 outline-none">
        <textarea id="pDesc" placeholder="Descripción detallada" class="w-full bg-black border border-zinc-800 p-3 rounded-xl h-24 focus:border-orange-500 outline-none md:col-span-2"></textarea>
        <input id="pImgs" type="text" placeholder="Ruta imagen (ej: img/reloj.jpg)" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-orange-500 outline-none md:col-span-2">
      </div>
      <div class="mt-8 flex gap-4">
        <button onclick="window.guardarProducto()" class="flex-1 bg-orange-600 py-3 rounded-xl font-bold hover:bg-orange-500">Publicar</button>
        <button onclick="window.cerrarAdmin()" class="flex-1 bg-zinc-800 py-3 rounded-xl font-bold">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
