<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TechStore 🔥 | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white">

  <header class="bg-black p-5 border-b border-zinc-800 flex justify-between items-center">
    <h1 onclick="mostrarSeccion('inicio')" class="text-2xl font-bold cursor-pointer">🔥 TechStore</h1>
    <nav class="flex gap-6">
      <button onclick="mostrarSeccion('inicio')">Inicio</button>
      <button onclick="mostrarSeccion('catalogo')">Catálogo</button>
      <button onclick="abrirLogin()" class="bg-orange-600 px-5 py-2 rounded-full font-bold">👤 Admin</button>
    </nav>
  </header>

  <section id="inicio" class="py-20 text-center">
    <h2 class="text-5xl font-bold">Panel de Gestión</h2>
  </section>

  <section id="catalogo" class="max-w-7xl mx-auto p-6 hidden">
    <div id="catalogoGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
  </section>

  <div id="loginBox" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 p-8 rounded-2xl w-80 border border-zinc-800">
      <h3 class="text-center font-bold mb-4">Admin Login</h3>
      <input id="user" type="email" placeholder="Email" class="w-full bg-black p-3 mb-2 rounded-lg outline-none border border-zinc-800">
      <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-black p-3 mb-4 rounded-lg outline-none border border-zinc-800">
      <button onclick="login()" class="w-full bg-orange-600 py-3 rounded-lg font-bold">Entrar</button>
      <button onclick="cerrarLogin()" class="w-full text-zinc-500 mt-4 text-sm">Cerrar</button>
    </div>
  </div>

  <div id="adminPanel" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
    <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-lg border border-zinc-800">
      <h2 class="text-orange-500 font-bold text-xl mb-6">Agregar Producto Local</h2>
      <input id="pNombre" type="text" placeholder="Nombre del producto" class="w-full bg-black p-3 mb-3 rounded-xl border border-zinc-800">
      <input id="pPrecio" type="number" placeholder="Precio" class="w-full bg-black p-3 mb-3 rounded-xl border border-zinc-800">
      <textarea id="pDesc" placeholder="Descripción" class="w-full bg-black p-3 mb-3 rounded-xl border border-zinc-800 h-20"></textarea>
      
      <div class="mb-6">
        <label class="block text-xs text-zinc-500 mb-2">SELECCIONAR FOTO DEL PC:</label>
        <input id="pArchivo" type="file" accept="image/*" class="w-full text-sm">
      </div>

      <div class="flex gap-3">
        <button onclick="guardarProducto()" class="flex-1 bg-orange-600 py-3 rounded-xl font-bold">Subir y Guardar</button>
        <button onclick="cerrarAdmin()" class="flex-1 bg-zinc-800 py-3 rounded-xl">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
