<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore 🔥 | Gadgets Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white font-sans">

  <!-- HEADER PROFESIONAL -->
  <header class="bg-black/95 backdrop-blur-xl sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div onclick="mostrarSeccion('inicio'); toggleMobileMenu()" class="flex items-center gap-3 cursor-pointer">
        <img src="https://dlzerjvbqixllkkralfz.supabase.co/storage/v1/object/public/imagenes_productos/logo-techstore.png" 
             alt="TechStore" class="h-10 w-auto">
        <span class="text-3xl font-black tracking-[-2px] text-white">TECHSTORE</span>
      </div>

      <nav class="hidden md:flex items-center gap-10 text-sm font-semibold uppercase tracking-widest">
        <button onclick="mostrarSeccion('inicio')" class="relative py-2 hover:text-orange-400 transition-colors group">
          Inicio
          <span class="absolute bottom-0 left-0 h-[2px] w-0 bg-orange-400 group-hover:w-full transition-all duration-300"></span>
        </button>
        <button onclick="mostrarSeccion('catalogo')" class="relative py-2 hover:text-orange-400 transition-colors group">
          Catálogo
          <span class="absolute bottom-0 left-0 h-[2px] w-0 bg-orange-400 group-hover:w-full transition-all duration-300"></span>
        </button>
      </nav>

      <div class="flex items-center gap-4">
        <button onclick="abrirLogin()" class="flex items-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 px-6 py-3 rounded-3xl font-bold text-sm transition-all active:scale-95 shadow-lg shadow-orange-500/30">
          <i class="fa-solid fa-shield-halved"></i>
          <span class="hidden sm:inline">Admin</span>
        </button>

        <button onclick="toggleCart()" class="relative bg-zinc-900 hover:bg-zinc-800 p-4 rounded-3xl transition-all active:scale-95">
          <i class="fa-solid fa-cart-shopping text-2xl"></i>
          <span id="cartCount" class="absolute -top-1 -right-1 bg-orange-500 text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-2xl">0</span>
        </button>

        <button onclick="toggleMobileMenu()" class="md:hidden p-3 text-3xl text-white hover:text-orange-400 transition-colors">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>

    <!-- MENÚ MÓVIL -->
    <div id="mobileMenu" class="hidden md:hidden bg-black/95 border-t border-zinc-800 py-6">
      <div class="max-w-7xl mx-auto px-6 flex flex-col gap-3 text-lg font-semibold">
        <button onclick="mostrarSeccion('inicio'); toggleMobileMenu()" class="flex items-center gap-4 px-6 py-5 hover:bg-zinc-900 rounded-3xl transition-colors">
          <i class="fa-solid fa-house w-6"></i><span>Inicio</span>
        </button>
        <button onclick="mostrarSeccion('catalogo'); toggleMobileMenu()" class="flex items-center gap-4 px-6 py-5 hover:bg-zinc-900 rounded-3xl transition-colors">
          <i class="fa-solid fa-store w-6"></i><span>Catálogo</span>
        </button>
      </div>
    </div>
  </header>

  <!-- HERO - NUEVO ESTILO PREMIUM -->
  <section id="inicio" class="relative min-h-screen flex items-center overflow-hidden">
    <img src="https://dlzerjvbqixllkkralfz.supabase.co/storage/v1/object/public/imagenes_productos/banner-hero.jpg" 
         class="absolute inset-0 w-full h-full object-cover" alt="Banner">
    
    <!-- Nuevo gradiente más elegante y profesional -->
    <div class="absolute inset-0 bg-gradient-to-br from-black/90 via-zinc-950/80 to-transparent"></div>
    
    <div class="max-w-7xl mx-auto px-6 relative z-10">
      <div class="bg-black/70 backdrop-blur-2xl p-10 md:p-12 rounded-3xl max-w-xl border border-white/10">
        <h1 class="text-6xl md:text-7xl font-black tracking-tighter leading-none">
          TECHSTORE <span class="text-orange-400">🔥</span>
        </h1>
        <p class="text-3xl text-orange-300 mt-4">Gadgets Premium • Pago Contra Entrega</p>
        <p class="mt-6 text-zinc-300 text-lg">Envío rápido a todo Colombia • Garantía real • Calidad premium</p>
        
        <button onclick="mostrarSeccion('catalogo')" 
                class="mt-10 bg-white text-black font-bold text-2xl px-12 py-6 rounded-3xl hover:scale-105 transition-all flex items-center gap-3">
          <span>EXPLORAR CATÁLOGO</span>
